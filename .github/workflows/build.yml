name: Build ShellSafety

on: [push, pull_request]

jobs:
  package_source:
    name: Package Source Code
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-mark manual ghc
          sudo apt-get install cabal-install

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deduce tags
        run: |
          mkdir source
          echo "latest" > source/tags
          if tag=$(git tag -l 'v*' --points-at HEAD | head -1) && [ -n "$tag" ]
          then
            echo "stable" >> source/tags
            echo "$tag" >> source/tags
          fi
          cat source/tags

      - name: Package Source
        run: |
          cabal sdist
          mv dist-newstyle/sdist/*.tar.gz source/source.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: source
          path: source/

  run_tests:
    name: Run tests (GHC ${{ matrix.ghc }})
    needs: package_source
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ghc: ['9.14.1', 'latest']
        include:
          - ghc: '9.14.1'
            cabal_flags: '--allow-newer'
          - ghc: 'latest'
            cabal_flags: '--allow-newer'
      fail-fast: false
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: source
          path: source/

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Unpack source
        run: |
          cd source
          tar xvf source.tar.gz --strip-components=1

      - name: Build and run tests
        run: |
          cd source
          cabal test ${{ matrix.cabal_flags }}

  wait_for_builders:
    name: Wait for builder images
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for concurrent builder workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Allow time for concurrent workflows to register
          sleep 5
          # Check if a builders workflow is running for the same commit
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" \
            --workflow=builders.yml \
            --commit "$GITHUB_SHA" \
            --json databaseId,status \
            --jq '.[] | select(.status != "completed") | .databaseId' \
            | head -1)
          if [ -n "$run_id" ]; then
            echo "Waiting for builders workflow run $run_id..."
            gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          else
            echo "No in-progress builders workflow found, proceeding."
          fi

  build_source:
    name: Build
    needs: [package_source, wait_for_builders]
    if: ${{ !cancelled() && needs.package_source.result == 'success' && needs.wait_for_builders.result != 'failure' }}
    permissions:
      packages: read
    strategy:
      matrix:
        build: [linux.x86_64, linux.aarch64, darwin.x86_64, darwin.aarch64]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: source
          path: source/

      - name: Build source
        run: |
          mkdir -p bin
          mkdir -p bin/${{matrix.build}}
          ( cd bin && ../builders/run_builder ../source/source.tar.gz ../builders/${{matrix.build}} )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.build}}.bin
          path: bin/

  package_binary:
    name: Package Binaries
    needs: build_source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: List files for debugging
        run: find .

      - name: Work around GitHub permissions bug
        run: chmod +x *.bin/*/shellsafety*

      - name: Package binaries
        run: |
          export TAGS="$(cat source/tags)"
          mkdir -p deploy
          cp -r *.bin/* deploy
          cd deploy
          ../.prepare_deploy
          rm -rf */ README* LICENSE*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: deploy
          path: deploy/

  deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Deploy binaries
    needs: package_binary
    runs-on: ubuntu-latest
    environment: Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts (source)
        uses: actions/download-artifact@v8
        with:
          name: source
          path: source/

      - name: Download artifacts (binaries)
        uses: actions/download-artifact@v8
        with:
          name: deploy
          path: deploy/

      - name: Upload to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAGS="$(cat source/tags)"
          ./.github_deploy
