name: Build ShellSafety

on: [push, pull_request]

jobs:
  package_source:
    name: Package Source Code
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-mark manual ghc
          sudo apt-get install cabal-install

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deduce tags
        run: |
          mkdir source
          echo "latest" > source/tags
          if tag=$(git describe --exact-match --tags)
          then
            echo "stable" >> source/tags
            echo "$tag" >> source/tags
          fi
          cat source/tags

      - name: Package Source
        run: |
          cabal sdist
          mv dist-newstyle/sdist/*.tar.gz source/source.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: source
          path: source/

  run_tests:
    name: Run tests (GHC ${{ matrix.ghc }})
    needs: package_source
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ghc: ['9.14.1', 'latest']
        include:
          - ghc: 'latest'
            cabal_flags: '--allow-newer'
      fail-fast: false
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: source
          path: source/

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Unpack source
        run: |
          cd source
          tar xvf source.tar.gz --strip-components=1

      - name: Build and run tests
        run: |
          cd source
          cabal test --allow-newer ${{ matrix.cabal_flags }}

  build_source:
    name: Build
    needs: package_source
    permissions:
      packages: read
    strategy:
      matrix:
        build: [linux.x86_64, linux.aarch64, darwin.x86_64, darwin.aarch64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: source
          path: source/

      - name: Build source
        run: |
          mkdir -p bin
          mkdir -p bin/${{matrix.build}}
          ( cd bin && ../builders/run_builder ../source/source.tar.gz ../builders/${{matrix.build}} )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.build}}.bin
          path: bin/

  package_binary:
    name: Package Binaries
    needs: build_source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: List files for debugging
        run: find .

      - name: Work around GitHub permissions bug
        run: chmod +x *.bin/*/shellsafety*

      - name: Package binaries
        run: |
          export TAGS="$(cat source/tags)"
          mkdir -p deploy
          cp -r *.bin/* deploy
          cd deploy
          ../.prepare_deploy
          rm -rf */ README* LICENSE*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: deploy
          path: deploy/

  deploy:
    if: github.event_name == 'push'
    name: Deploy binaries
    needs: package_binary
    runs-on: ubuntu-latest
    environment: Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts (source)
        uses: actions/download-artifact@v8
        with:
          name: source
          path: source/

      - name: Download artifacts (binaries)
        uses: actions/download-artifact@v8
        with:
          name: deploy
          path: deploy/

      - name: Upload to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAGS="$(cat source/tags)"
          ./.github_deploy
